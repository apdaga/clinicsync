<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClinicSync</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a5276" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClinicSync" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a5276;
    }

    /* Clips anything outside viewport — hides GAS banner above */
    #frame-wrapper {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* Splash screen shown while iframe loads */
    #splash {
      position: fixed;
      inset: 0;
      background: #1a5276;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 20px;
    }
    #splash h1 {
      color: #ffffff;
      font-size: 26px;
      font-family: Arial, sans-serif;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    #splash p {
      color: #17a589;
      font-size: 13px;
      font-family: Arial, sans-serif;
      margin-top: 6px;
    }
    .spinner {
      margin-top: 32px;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #17a589;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* The app iframe — pushed up exactly the GAS banner height */
    #app-frame {
      position: absolute;
      top: -40px;
      left: 0;
      width: 100%;
      height: calc(100% + 40px);
      border: none;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <img src="icons/icon-192.png" alt="ClinicSync" />
    <h1>ClinicSync</h1>
    <p>Clinical Patient Management</p>
    <div class="spinner"></div>
  </div>

  <!-- App iframe -->
  <div id="frame-wrapper">
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycby4FymWf-e1EYy0TD9VB9IWKHC-EXe8f87w0Wv70y41KiyHSr4oT-6d17VNREvvI8g2pA/exec"
    allow="clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
  ></iframe>
  </div>

  <script>
    // Register service worker for PWA installability
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }

    // Hide splash once iframe has loaded
    var frame = document.getElementById('app-frame');
    var splash = document.getElementById('splash');

    frame.addEventListener('load', function() {
      setTimeout(function() {
        splash.classList.add('hidden');
        setTimeout(function() { splash.style.display = 'none'; }, 450);
      }, 600);
    });

    // Fallback — hide splash after 8s even if load event doesn't fire
    setTimeout(function() {
      splash.classList.add('hidden');
      setTimeout(function() { splash.style.display = 'none'; }, 450);
    }, 8000);
  </script>

</body>
</html>

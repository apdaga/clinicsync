<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClinicSync</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a5276" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClinicSync" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Open Graph — WhatsApp / Facebook / Twitter preview card -->
  <meta property="og:title"       content="ClinicSync — Clinic Management on the go" />
  <meta property="og:description" content="Manage patients, registrations, follow-ups, appointments, transactions with detailed analytics on fingertips — anywhere, anytime." />  
  <meta property="og:image"       content="https://apdaga.github.io/ClinicSync/icons/icon-512.png" />
  <meta property="og:image:width"  content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:url"         content="https://apdaga.github.io/ClinicSync/" />
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="ClinicSync" />

  <!-- Twitter card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="ClinicSync — Clinical Patient Management" />
  <meta name="twitter:description" content="Manage patients, follow-ups, appointments and analytics — anywhere, anytime." />
  <meta name="twitter:image"       content="https://apdaga.github.io/ClinicSync/icons/icon-512.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a5276;
    }

    #app-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #1a5276;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash img {
      width: 100px; height: 100px;
      border-radius: 24px;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      background-color: #1a5276;
    }
    #splash h1 {
      color: #fff;
      font-size: 28px;
      font-family: Arial, sans-serif;
      font-weight: 700;
    }
    #splash p {
      color: #17a589;
      font-size: 14px;
      font-family: Arial, sans-serif;
      margin-top: 8px;
    }
    .spinner {
      margin-top: 36px;
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #17a589;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <iframe id="app-frame"
    src="https://script.google.com/macros/s/AKfycby4FymWf-e1EYy0TD9VB9IWKHC-EXe8f87w0Wv70y41KiyHSr4oT-6d17VNREvvI8g2pA/exec"
    allow="clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
    style="visibility:hidden"
  ></iframe>

  <div id="splash">
    <img src="icons/icon-192.png" alt="ClinicSync" />
    <h1>ClinicSync</h1>
    <p>Clinical Patient Management</p>
    <div class="spinner"></div>
  </div>

  <!-- Offline screen — lives in PWA shell (outside iframe) so it works even when GAS can't load -->
  <div id="offline-screen" style="display:none;position:fixed;inset:0;z-index:200;
    background:#f0f4f8;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;gap:16px;font-family:Arial,sans-serif">
    <div style="font-size:64px;line-height:1">&#128225;</div>
    <h2 style="margin:0;font-size:20px;color:#1a5276;font-weight:700">No Internet Connection</h2>
    <p style="margin:0;color:#5d6d7e;font-size:14px;line-height:1.7;max-width:280px">
      ClinicSync needs an internet connection to reach the server.<br>
      Please check your Wi-Fi or mobile data and try again.
    </p>
    <button id="retry-btn" onclick="retryLoad()"
      style="margin-top:8px;padding:13px 32px;background:#1a5276;color:white;border:none;
      border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.3px">
      &#8635; Retry
    </button>
    <p id="offline-status" style="margin:0;font-size:12px;color:#999">Waiting for connection&#8230;</p>
  </div>

  <!-- Offline banner — lives in PWA shell so visualViewport works correctly above keyboard -->
  <div id="offline-banner" style="display:none;position:fixed;left:0;right:0;z-index:300;
    background:#e74c3c;color:white;text-align:center;padding:10px 16px;font-size:13px;
    font-weight:600;align-items:center;justify-content:center;gap:8px;font-family:Arial,sans-serif">
    &#128246; No internet connection &#8212; changes may not be saved
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }

    var gone         = false;
    var offlineShown = false;
    var iframeReady  = false;  // true once connectivity confirmed and iframe made visible
    var GAS_URL      = document.getElementById('app-frame').src;

    // ── Splash ────────────────────────────────────────────────────────────────
    function hideSplash() {
      if (gone) return; gone = true;
      var s = document.getElementById('splash');
      s.classList.add('fade-out');
      setTimeout(function() { s.style.display = 'none'; }, 550);
    }

    // ── Offline screen ────────────────────────────────────────────────────────
    function showOffline(msg) {
      offlineShown = true;
      // Iframe is already invisible (visibility:hidden in HTML) — keep it hidden
      var st = document.getElementById('offline-status');
      if (st) st.textContent = msg || 'No internet connection.';
      document.getElementById('offline-screen').style.display = 'flex';
      hideSplash();
    }
    function hideOffline() {
      offlineShown = false;
      document.getElementById('offline-screen').style.display = 'none';
    }

    // ── Offline banner (above keyboard, no postMessage needed) ────────────────
    // Runs in top-level PWA shell where visualViewport tracks real keyboard height
    function showBanner() {
      var b = document.getElementById('offline-banner');
      b.style.display = 'flex';
      adjustBanner();
    }
    function hideBanner() {
      var b = document.getElementById('offline-banner');
      b.style.display = 'none';
    }
    function adjustBanner() {
      var b = document.getElementById('offline-banner');
      if (!b || b.style.display === 'none') return;
      if (window.visualViewport) {
        var kbHeight = window.innerHeight
                     - window.visualViewport.height
                     - window.visualViewport.offsetTop;
        b.style.bottom = Math.max(0, Math.round(kbHeight)) + 'px';
      } else {
        b.style.bottom = '0px';
      }
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', adjustBanner);
      window.visualViewport.addEventListener('scroll', adjustBanner);
    }

    // Banner driven by browser offline/online events on the TOP-LEVEL window
    // (not inside the iframe — these fire reliably in the PWA shell)
    window.addEventListener('offline', function() {
      if (iframeReady) showBanner();
    });
    window.addEventListener('online', function() {
      hideBanner();
      if (offlineShown) {
        // Auto-retry if stuck on offline screen
        document.getElementById('offline-status').textContent =
          'Connection detected — retrying…';
        setTimeout(retryLoad, 800);
      }
    });

    // ── Connectivity check ────────────────────────────────────────────────────
    // fetch generate_204: tiny, no CORS, works even when GAS is down
    function checkConnectivity(timeoutMs) {
      return new Promise(function(resolve) {
        var done  = false;
        var timer = setTimeout(function() {
          if (!done) { done = true; resolve(false); }
        }, timeoutMs || 6000);
        fetch('https://connectivitycheck.gstatic.com/generate_204', {
          method: 'HEAD', mode: 'no-cors', cache: 'no-store'
        })
        .then(function() { if (!done) { done = true; clearTimeout(timer); resolve(true);  } })
        .catch(function() { if (!done) { done = true; clearTimeout(timer); resolve(false); } });
      });
    }

    // ── Retry ─────────────────────────────────────────────────────────────────
    window.retryLoad = function() {
      var btn = document.getElementById('retry-btn');
      var st  = document.getElementById('offline-status');
      btn.disabled    = true;
      btn.textContent = 'Checking…';
      st.textContent  = 'Checking connection…';
      checkConnectivity(6000).then(function(online) {
        btn.disabled    = false;
        btn.textContent = '↺ Retry';
        if (online) {
          hideOffline();
          // Reset splash
          gone = false;
          var splash = document.getElementById('splash');
          splash.style.display = 'flex';
          splash.style.opacity = '1';
          splash.classList.remove('fade-out');
          // Reload iframe
          var frame = document.getElementById('app-frame');
          frame.style.visibility = 'hidden';
          frame.src = '';
          setTimeout(function() {
            frame.src = GAS_URL;
            iframeReady = true;           // ← was missing — load event checks this
            frame.style.visibility = 'visible';
          }, 150);
        } else {
          st.textContent = "Still can't reach server. Check your connection.";
        }
      });
    };

    // ── Startup ───────────────────────────────────────────────────────────────
    // iframe starts invisible (visibility:hidden in HTML attribute).
    // Check connectivity FIRST. Only reveal iframe after we know it will load.
    checkConnectivity(6000).then(function(online) {
      if (!online) {
        showOffline('No internet connection.');
      } else {
        // Online — reveal iframe, it's already loading in background
        document.getElementById('app-frame').style.visibility = 'visible';
        iframeReady = true;
      }
    });

    // Hide splash only after iframe becomes visible AND finishes loading
    document.getElementById('app-frame').addEventListener('load', function() {
      if (!offlineShown && iframeReady) {
        setTimeout(hideSplash, 700);
      }
    });

  </script>



</body>
</html>

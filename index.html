<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClinicSync</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a5276" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClinicSync" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Open Graph — WhatsApp / Facebook / Twitter preview card -->
  <meta property="og:title"       content="ClinicSync — Clinic Management on the go" />
  <meta property="og:description" content="Manage patients, registrations, follow-ups, appointments, transactions with detailed analytics on fingertips — anywhere, anytime." />
  <meta property="og:image"       content="https://apdaga.github.io/ClinicSync/icons/icon-512.png" />
  <meta property="og:image:width"  content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:url"         content="https://apdaga.github.io/ClinicSync/" />
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="ClinicSync" />

  <!-- Twitter card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="ClinicSync — Clinical Patient Management" />
  <meta name="twitter:description" content="Manage patients, follow-ups, appointments and analytics — anywhere, anytime." />
  <meta name="twitter:image"       content="https://apdaga.github.io/ClinicSync/icons/icon-512.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a5276;
    }

    #app-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #1a5276;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash img {
      width: 100px; height: 100px;
      border-radius: 24px;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #splash h1 {
      color: #fff;
      font-size: 28px;
      font-family: Arial, sans-serif;
      font-weight: 700;
    }
    #splash p {
      color: #17a589;
      font-size: 14px;
      font-family: Arial, sans-serif;
      margin-top: 8px;
    }
    .spinner {
      margin-top: 36px;
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #17a589;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <iframe id="app-frame"
    src="https://script.google.com/macros/s/AKfycby4FymWf-e1EYy0TD9VB9IWKHC-EXe8f87w0Wv70y41KiyHSr4oT-6d17VNREvvI8g2pA/exec"
    allow="clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
  ></iframe>

  <div id="splash">
    <img src="icons/icon-192.png" alt="ClinicSync" />
    <h1>ClinicSync</h1>
    <p>Clinical Patient Management</p>
    <div class="spinner"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }

    var gone = false;
    function hideSplash() {
      if (gone) return; gone = true;
      var s = document.getElementById('splash');
      s.classList.add('fade-out');
      setTimeout(function() { s.style.display = 'none'; }, 550);
    }

    document.getElementById('app-frame').addEventListener('load', function() {
      setTimeout(hideSplash, 700);
    });

    setTimeout(hideSplash, 10000);

    // Listen for exit request from GAS app inside iframe
    window.addEventListener("message", function(e) {
      if (e.data && e.data.action === "close_app") {
        window.close();
      }
    });
  </script>

</body>
</html>

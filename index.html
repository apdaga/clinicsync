<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClinicSync</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a5276" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClinicSync" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a5276; }

    #frame-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }
    #app-frame {
      position: absolute;
      left: 0; width: 100%; border: none;
    }
    /* Navy mask — same color as app header, clicks pass through */
    #banner-mask {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #1a5276;
      pointer-events: none;
      z-index: 50;
    }
    #splash {
      position: fixed; inset: 0;
      background: #1a5276;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.5s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash img { width: 100px; height: 100px; border-radius: 24px; margin-bottom: 22px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    #splash h1 { color: #fff; font-size: 28px; font-family: Arial, sans-serif; font-weight: 700; }
    #splash p  { color: #17a589; font-size: 14px; font-family: Arial, sans-serif; margin-top: 8px; }
    .spinner { margin-top: 36px; width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #17a589; border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="frame-wrapper">
    <iframe id="app-frame"
      src="https://script.google.com/macros/s/AKfycby4FymWf-e1EYy0TD9VB9IWKHC-EXe8f87w0Wv70y41KiyHSr4oT-6d17VNREvvI8g2pA/exec"
      allow="clipboard-read; clipboard-write"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
    ></iframe>
  </div>

  <div id="banner-mask"></div>

  <div id="splash">
    <img src="icons/icon-192.png" alt="ClinicSync" />
    <h1>ClinicSync</h1>
    <p>Clinical Patient Management</p>
    <div class="spinner"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }

    var frame  = document.getElementById('app-frame');
    var mask   = document.getElementById('banner-mask');
    var splash = document.getElementById('splash');

    /*
     * GAS banner measured heights (actual, from testing):
     *   Desktop  (>= 1024px) : single line  ~40px  → use 46px
     *   Tablet   (600-1023px): single line  ~44px  → use 50px
     *   Phone    (< 600px)   : wraps        ~56px  → use 62px
     *
     * The navy mask covers this offset with app-header color (#1a5276)
     * so clipped header pixels are invisible — seamless blend.
     * pointer-events:none means all clicks reach the iframe normally.
     */
    function getOffset() {
      var w = window.innerWidth;
      if (w >= 1024) return 46;
      if (w >=  600) return 50;
      return 62;
    }

    function applyLayout() {
      var o = getOffset();
      frame.style.top    = '-' + o + 'px';
      frame.style.height = 'calc(100% + ' + o + 'px)';
      mask.style.height  = o + 'px';
    }

    applyLayout();
    window.addEventListener('resize', applyLayout);

    var gone = false;
    function hideSplash() {
      if (gone) return; gone = true;
      splash.classList.add('fade-out');
      setTimeout(function() { splash.style.display = 'none'; }, 550);
    }
    frame.addEventListener('load', function() { setTimeout(hideSplash, 700); });
    setTimeout(hideSplash, 10000);
  </script>

</body>
</html>

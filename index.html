<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClinicSync</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a5276" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClinicSync" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a5276;
    }

    #frame-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    #app-frame {
      position: absolute;
      left: 0;
      width: 100%;
      border: none;
      /* top and height controlled by JS based on device width */
    }

    /* Splash screen */
    #splash {
      position: fixed;
      inset: 0;
      background: #1a5276;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash img {
      width: 100px; height: 100px;
      border-radius: 24px;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #splash h1 {
      color: #ffffff;
      font-size: 28px;
      font-family: Arial, sans-serif;
      font-weight: 700;
    }
    #splash p {
      color: #17a589;
      font-size: 14px;
      font-family: Arial, sans-serif;
      margin-top: 8px;
    }
    .spinner {
      margin-top: 36px;
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #17a589;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="splash">
    <img src="icons/icon-192.png" alt="ClinicSync" />
    <h1>ClinicSync</h1>
    <p>Clinical Patient Management</p>
    <div class="spinner"></div>
  </div>

  <div id="frame-wrapper">
    <iframe
      id="app-frame"
      src="https://script.google.com/macros/s/AKfycby4FymWf-e1EYy0TD9VB9IWKHC-EXe8f87w0Wv70y41KiyHSr4oT-6d17VNREvvI8g2pA/exec"
      allow="clipboard-read; clipboard-write"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
    ></iframe>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }

    var frame   = document.getElementById('app-frame');
    var wrapper = document.getElementById('frame-wrapper');
    var splash  = document.getElementById('splash');

    // GAS banner height varies by viewport width:
    //   >= 768px  → fits on one line → ~40px
    //   480-767px → may wrap         → ~56px
    //   < 480px   → wraps fully      → ~72px
    // Extra 4px safety buffer added to each tier.
    function getBannerOffset() {
      var w = window.innerWidth;
      if (w >= 768) return 44;
      if (w >= 480) return 60;
      return 76;
    }

    function applyOffset() {
      var offset = getBannerOffset();
      frame.style.top    = '-' + offset + 'px';
      frame.style.height = 'calc(100% + ' + offset + 'px)';
    }

    applyOffset();
    window.addEventListener('resize', applyOffset);

    var splashHidden = false;
    function hideSplash() {
      if (splashHidden) return;
      splashHidden = true;
      splash.classList.add('fade-out');
      setTimeout(function() { splash.style.display = 'none'; }, 550);
    }

    frame.addEventListener('load', function() {
      setTimeout(hideSplash, 700);
    });

    setTimeout(hideSplash, 10000);
  </script>

</body>
</html>
